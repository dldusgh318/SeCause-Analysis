name: CI workflow

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop

jobs:
  ci:
    if: github.repository == 'SeCause/SeCause-Analysis'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

     #테스트 통과를 위한 더미 값
      - name: Compile Python files
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/secause
          CLAUDE_API_KEY: test-key
          REDIS_URL: redis://localhost:6379/0
        run: python -m compileall app

      - name: Build Docker image
        run: docker build -t secause-analysis:test .
